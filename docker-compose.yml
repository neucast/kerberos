services:
  kdc-service:
    build:
      context: .
      dockerfile: Dockerfile.kdc
    container_name: kdc-service
    environment:
      - KRB5_REALM=EXAMPLE.COM
      - KRB5_KDC=kdc-service
      - KRB5_PASS=password
    volumes:
      - ./keytabs:/etc/security/keytabs
    healthcheck:
      test: ["CMD-SHELL", "kadmin.local -q 'listprincs' > /dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  kerberos-app:
    build: .
    container_name: kerberos-app
    depends_on:
      kdc-service:
        condition: service_healthy
    volumes:
      - ./keytabs:/etc/security/keytabs
    command: ["com.example.kerberos.KerberosClient"]
